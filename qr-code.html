<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código QR - ISTQB Validation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .qr-container {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .qr-code {
            max-width: 100%;
            height: auto;
            border: 5px solid white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .url {
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
            word-break: break-all;
            font-size: 14px;
        }
        .instructions {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }
        .instructions h3 {
            color: #667eea;
            margin-top: 0;
            font-size: 18px;
        }
        .instructions ol {
            color: #555;
            line-height: 1.8;
            padding-left: 20px;
        }
        .download-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .download-btn:hover {
            background: #5568d3;
        }
        @media print {
            body {
                background: white;
            }
            .download-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Código QR</h1>
        <p class="subtitle">Validación ISTQB</p>
        
        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://mespa.github.io/tets/" 
                 alt="Código QR" 
                 class="qr-code"
                 id="qrImage">
        </div>
        
        <div class="url">
            https://mespa.github.io/tets/
        </div>

        <button class="download-btn" onclick="descargarQR()">
            ⬇️ Descargar Código QR
        </button>

        <div class="instructions">
            <h3>📋 Cómo usar:</h3>
            <ol>
                <li>Escanea el código QR con la cámara de tu celular</li>
                <li>O descárgalo haciendo clic en el botón</li>
                <li>Compártelo para validar tu certificación ISTQB</li>
            </ol>
        </div>
    </div>

    <script>
        function descargarQR() {
            // Crear un enlace temporal para descargar la imagen
            const link = document.createElement('a');
            link.href = 'https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&data=https://mespa.github.io/tets/';
            link.download = 'qr-istqb-validation.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // También permitir imprimir con Ctrl+P
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                e.preventDefault();
                window.print();
            }
        });
    </script>
</body>
</html>
